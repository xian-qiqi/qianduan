    <style>
        *{

        }
        .container{
            height: 600px;
            width: 912px;
            margin: 0 auto;
            /* background-color: bisque; */

        }
        .box{
            width: 275px;
            height: 275px;
            border: 6px solid #cccccc;
            position: relative;
            float: left;
            margin-right: 25px;
            margin-bottom: 25px;
            /* 图片超出box盒子了。解决方法
            1.将box盒子width912改大一点
            2.将最右边的边距设为margin 0 （最后一步）*/
        }
        .box .pic{
            width: 100%;
            height: 100%;
            /* opacity: 0.7; */
            /* 透明度 */
            
        }
        .box .pic1{
            height: 50px;
            position: absolute;
            bottom: 0px;
            left: 0px;
        }
        .box .anthor{
            display: none;
        }
        .box:hover .anthor{
            display: block;
        }
        .box p{
            position: absolute;
            left: 0;
            top: 0;
           color: pink;
            display: none;
            padding: 7px 5px;

        }
        .box:hover p{
            display: block;
        }
        .box img{
            width: 50px;
            height: 50px;
        }
        
        .box .text{
           padding-left:50px;
           padding-top: 10000px;/* 为啥无用 */
           line-height: 50px;
        }
        .box:hover .pic{
            opacity: 0.7;
        }

        .rightpic{
            margin-right: 0;
        }

    </style>
</head>
