<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
        }

        img{
            display: block;
        }

        #box{
            width: 526px;
            height: 733px;
            /* background-color: yellow; */
            margin: 0 auto;
            padding: 26px 26px 40px 26px;
        }

        .title{
            width: 511px;
            height: 38px;
            /* background: red; */
            border-left:6px solid #294471 ;
            padding-bottom: 4px;
            padding-left: 9px;
            color: #294471;
            /* font-size: 142px 38px; */
            font-size: 35px;
            line-height: 38px;

            margin-bottom: 25px;
            
        }

        .bigpic{
            width: 526px;
            height: 373px;
            margin-bottom: 37px;
        }

        .bigpic p{
            width: 523px;
            height: 57px;
            background: #f6f5fa;
            font-size: 27px;
            text-align: center center;
            line-height: 57px;

        }

        .smallpic{
            width: 526px;
            height: 262px;
        }

        .smallpic p{
            font-size: 27px;
            width: 247px;
            height: 78px;
            background: #f6f5fa;
            line-height: 39px;
        }

        .left {
            float: left;
        }

        .right{
            float: right;
        }
    </style>
</head>
<body>
    <div id="box">
        <div class="title">女人图片</div>
        
        <div class="bigpic">
            <img src="bigpic.png" alt="">
            <p>大姐利用“异界联盟”经营美容院，救了自</p>
        </div>
        
        <div class="smallpic">
            <div class="left">
                <img src="smallpic-1.png" alt="">
                <p>无效化妆，无效穿搭，容貌焦虑</p>
            </div>
            <div class="right">
                <img src="smallpic=2.png" alt="">
                <p>小个子不要怕，高人一等的穿搭给你</p>
            </div>
        </div>

    </div>
</body>
</html>
