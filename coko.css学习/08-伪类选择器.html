<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a:link{
            color: yellow;
            /* 只能用于从来没有交互过的标签 */
        }
        /* 初始的状态 */
        a:visited{
            color: purple;
        }
        /* 访问之后的 */

        a:hover{
            color: aquamarine;
        }
        /* 鼠标移上去的颜色 */
        a:active{
            color: orange;
        }
        /* 点击上去瞬间的颜色 */
    </style>
</head>
<body>
    <a href="http://www.baidu.com/">百度</a>
</body>
</html>
