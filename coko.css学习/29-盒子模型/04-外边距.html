<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        div{
            width: 200px;
            height: 200px;
        }

        .box1{
            background: red;
            border: 1px solid yellow;
            /* margin: 50px; */
            /* margin: 20px 50px; */
            margin: 10px 20px 30px 40px;
        }

        .box2{
            background: green;
            border: 1px solid blue;
            margin-top: -100px;
            margin-left: 60px; 
        }

        /*1. margin-方向 4个方向
        2.背景色没有蔓延
        3.*{margin:0}  取消外边距 如h1
        4.外边距负值？支持
        5.屏幕居中？margin:0 auto  横向居中
        margin：auto auto 没有意义
        */

        h1{
            margin: 0; 
        }

        .box3{
            background-color: black;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>

    <h1>hello</h1>
    <!-- 自带2400的上下外边框 -->

    <div class="box3"></div>
</body>
</html>
