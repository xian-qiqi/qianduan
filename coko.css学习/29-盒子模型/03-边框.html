<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .box1{
            width: 100px;
            height: 100px;
            background-color: yellow;
            border: 5px  dashed red;
            padding: 10px;

            /* style:solid实线  double双向 dashed虚线 dotted点状线*/
            /* 1.背景色也能蔓延到边框*/

        }

        .box2{
            width: 100px;
            height: 100px;
            background-color: blue;
            border-bottom: 5px  solid red;
        }

        .box3{
            width: 100px;
            height: 100px;
            background-color: blue;

/* 不常用 */
            border-width: 10px 20px 30px 10px;
            border-style:solid dashed dotted double;
            border-color:purple green yellow pink;

            /*
            border-width
            border-style
            border-color
             */
        }
    </style>
</head>
<body>
    <div class="box1">

    </div>

    <div class="box2"></div>
    <div class="box3"></div>

</body>
</html>
