<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
           .box1{
            width: 100px;
            height: 100px;
            background-color: yellow;
           }  
           .box2{
            width: 100px;
            height: 100px;
            background-color: yellow;
            position: absolute;
           }  

           /* 行内元素转化为块元素
           1.display：block；
           2.position：absolute；
           3.float：left; */
    </style>
</head>
<body>
    <span class="box1"> hello</span><br>
    <span class="box2">hello</span>

</body>
</html>
