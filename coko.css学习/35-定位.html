<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 静态定位，相对定位 */
        div{
            height: 200px;
            width: 200px;
        }
        .box1{
            background: aquamarine;
        }
        .box2{
            background: yellow;
            position: relative;
            top: 100px;
            left: 100px;
        }
        .box3{
            background: pink;
        }

        /* 绝对定位 */
        *{
            margin: 0;
            padding: 0;
        }
        .box4{
            background-color: blue;
            position: absolute;
            top: 100px;
            left: 200px;
        }
        .box5{
            background-color: blueviolet;
            position: absolute;
            top: 400px;
            left: 400px;
        }
        .child{
            width: 100px;
            height: 100px;
            background-color: aqua;
            position: absolute;
            top: 50px;
            left: 50px;
        }

        /* 固定定位 */
        .box{
            width: 200px;
            height: 200px;
            background-color: burlywood;

        }
        .ad{
            width: 200px;
            height: 200px;
            background-color: black;
            /* top: 300px;
            left: 300px;无用 */
        }

    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>

    <div class="box4"></div>
    <div class="box5">
        <div class="child"></div>
    </div>
    
    <div class="box"></div>
    <div class="ad"></div>

</body>
</html>
