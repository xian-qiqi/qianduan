<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>


    </style>
</head>
<body>
    <div>你对与京东首页的满意度如何？</div>
    <div>
        <input type="radio">非常满意
        <input type="radio">满意
        <input type="radio">一般
        <input type="radio">不满意
    </div>
    <br>
    <div>你对与京东首页的满意度如何？</div>
    <div>
        <input type="radio" name="aa" id="fei" >
        <label for="fei">非常满意</label>
        <!-- 点击“非常满意”文字也可以选中 -->
    </div>
    <div>
        <!-- <input type="radio" name="aa" id="man" checked="checked"> -->
        <input type="radio" name="aa" id="man" checked>
        <label for="man">满意</label>
        <!-- checked默认选中 
        checked="checked"简写为checked-->
    </div>
    <div>
        <input type="radio" name="aa">一般
    </div>
    <div>
        <input type="radio" name="aa">不满意
    </div>
</body>
</html>
