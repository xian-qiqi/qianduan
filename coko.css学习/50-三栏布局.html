<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
         margin: 0;
         padding: 0;
        }
 
       html,body{
        height: 100%;
       }
        .top,.bottom{/* 中间逗号， */
         height: 100px;
         width: 100%;
         background-color: aquamarine;
        }
        
        .center{
         width: 100%;
         height: calc(100% - 200px);
         background-color: bisque;
         
        }

       .cen-left,.cen-right{/* 中间逗号， */
        height: 100%;
        width: 100px;
        background-color: rgb(229, 218, 92);
       }

       .cen-left{
        float: left;
       }
       .cen-right{
        
        float: right;
       } 
       .cen-center{
        width: calc(100% - 200px);
        height: 100%;
        background-color: rgb(227, 40, 171);
        float: left;
        
       }
    
     </style>
</head>
<body>
    <div class="top"></div>
    <div class="center">
        <div class="cen-left"></div>
        <div class="cen-right"></div>
        <div class="cen-center"></div>
    </div>
    <div class="bottom"></div>
</body>
</html>
