<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 300px;
            margin: 0 auto;

        }
        ul{
            list-style: none;
        }
        .box .item{
            float: left;
            width: 148px;
            text-align: center;
            border: 1px solid blue;
            /* 有了border后宽度要减去2 */
            background: blue;
            color: white;
            line-height: 40px;

        }
        .item:hover{
            background: lightblue;
        }
        .item ul{
            display: none;
            background:white ;
            color: black;

        }

        /* .item>ul子代选择器
        .item ul后代选择器 */
        .item:hover ul{
            display: block;
            /* color: lightblue;错了 */
        }
        /* .item:hover li{
            color: lightblue;
        } 错了*/
        .item li:hover{
            color: blue;
        }

    
    </style>
</head>
<body>
    <ul class="box">
        <li class="item">视频教程
            <ul>
                <li>全部视频教程</li>
                <li>HTML5视频教程</li>
                <li>JAVA视频教程</li>
                <li>python视频教程</li>
            </ul>
        </li>
        <!-- 二级标签：在li标签里面再嵌套ul标签 -->
        <li class="item">认证考试
            <ul>
                <li>pmp</li>
                <li>红帽</li>
            </ul>
        </li>
    </ul>


        <!-- .item>ul子代选择器
        .item ul后代选择器  -->
        <!-- <img src="img/zidaixuanzeqihoudaixuanzeqi.png" alt=""> -->
</body>
</html>
