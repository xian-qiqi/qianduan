<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            width: 200px;
            height: 200px;
        }
        .box1{
            background-color: yellow;
            position: relative;
            left: 100px;
            top: 100px;
            z-index: 1;
            /* 2.层级：z-index越大，层级越大，越靠上显示 */
        }
        .box2{
            background-color: red;
            position: relative;
            /* 1.就近原则，红色在黄色方块上面 */

        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>

</body>
</html>
