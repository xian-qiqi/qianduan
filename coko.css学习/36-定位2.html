<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

         .header{
            background-color: yellow;
            width: 100%;
            height: 200px;
         }
         .nav{
            background-color: red;
            height: 100px;
            width: 500px;
            margin:0 auto;
            position: sticky;/* 无用，需要设置与顶部的距离 */
            top: 0px;

         }
         .body{
            background-color: blue;
            height: 1000px;
         }

    </style>
</head>
<body>
    <div class="header"></div>
    <div class="nav"></div>
    <div class="body"></div>

</body>
</html>
