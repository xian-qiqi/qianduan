<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .box{
            width: 500px;
            height: 500px;
            border: 1px solid #000000;
            margin: 100px auto;
            display: flex;
            flex-direction: column;
            
        }

        .box div{
            width: 100px;
            height: 100px;
            border: 1px solid red;
        }

        .div1,.div3{
            flex: 1;

        }
        /* 按比例进行空间分配*/
        .div2{
            flex: 2;
            /* 占满剩余空间 */
        }

    </style>
</head>
<body>
    <!-- 占满剩余空间  flex: 1; -->
    <div class="box">
        <div class="div1">1111</div>
        <div class="div2">2222</div>
        <div class="div3">3333</div> 
  
    </div>
</body>
</html>
