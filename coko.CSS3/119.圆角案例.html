<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin:0;
            padding: 0;
        }

        div{
            height: 120px;
            width: 935px;
            border:1px solid #dedede;
            margin:0 auto;
            background: #eceaeb;
            border-radius: 15px;
            box-shadow: 4px 11px 7px #bfbfbf,-4px 11px 7px #bfbfbf;
        }

        [type=text]{
            width: 683px;
            height: 86px;
            margin: 17px;
            border: 3px solid #cccccc;
            border-radius: 3px;
            font-size: 25px;
            text-indent: 11px; /* 缩进 */     
        }
        [type=button]{
            width: 200px;
            height: 83px;
            background: rgb(61, 113, 234);
            /* margin:; */
            border-radius: 5px;
            border: 1px solid #5ca3b4;
            font-size: 23px;
            color: white;

        }

    </style>
</head>
<body>

    </div>

        <div>
            <!-- value="Search for CSS3,HTML5,jQuery..." 字体使用placeholder添加进去-->
            <input type="text" placeholder="Search for CSS3,HTML5,jQuery...">
            <input type="button" value="GO">
        </div>
        
    </div>
    
</body>
</html>
