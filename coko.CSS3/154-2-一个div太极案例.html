<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            display: flex;
            justify-content: center;
            background-color: gray;
        }
        div{
            width: 300px;
            height: 300px;
            margin-top: 50px;
            background-color: yellow;
            border-radius: 50%;
            background: -moz-linear-gradient(white 50%,black 50%) ;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: run 4s linear infinite;
        }
        @keyframes run {
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        div::before{
            content: "";
            display: block;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: -moz-radial-gradient(black 25%,white 28%);
        }
        div::after{
            content: "";
            display: block;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: -moz-radial-gradient(white 25%,black 28%);
        }
        
    </style>
</head>
<body>
    <div >
        
    </div>
</body>
</html>
