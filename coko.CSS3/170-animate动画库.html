<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.1/animate.min.css">

    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            margin: 10px auto;
        }
        /* 默认设置不是想要的可以自己修改 */
        .myinfinite{
            animation-iteration-count: 3;
            animation-delay: 2s;
        }
    </style>
</head>
<body>
    <div class="animated bounce infinite"></div>
    <!-- 无限次 -->
    <div class="animated bounce myinfinite"></div>
    <!-- 三次 -->
    <div class="animated rubberBand myinfinite"></div>
    <div class="animated flip myinfinite"></div>

</body>
</html>
