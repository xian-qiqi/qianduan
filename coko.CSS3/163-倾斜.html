<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{
            width: 200px;
            height: 200px;
            background-color: pink;
            text-align: center;
            line-height: 200px;
            font-size: 30px;
            margin: 10px auto;
            /* transform: skewX(30deg); */
            transform: skewY(-30deg);
            /* 
            skewX正值，拽右下角，往右边拉动，形成30°            
            skewY
            skew(x,y) */
        }
    </style>
</head>
<body>
    <!-- skew()函数 -->
     <div>荧魈</div>
</body>
</html>
