        html,body{
            height: 100%;

        ul{

        }
        body{
            display: flex;
            flex-direction: column;
        }
    /* <header></header> */
        header{
            height: 45px;
            background-color: gray;
        }
        header ul{
            display: flex;
            overflow: auto;
            scrollbar-width: none; /* Firefox 隐藏滚动条*/
        }
        /* 水平方向滚动条 */
        header ul li{
            height: 100%;
            flex-shrink: 0;
            line-height: 45px;
            padding: 0px 5px;
        }
        header ul li:hover{
            color: #e93b3d;
        }


    /* <section></section> */
        section{
            flex: 1;
            display: flex;
            overflow: auto;
        }
        section ul{
            width: 85px;
            background-color: #ffffff;
            overflow: auto;
            /* 使section中某一部分进行滚动条设置 */
            scrollbar-width: none; /* Firefox 隐藏滚动条*/
        }
        /* ::-webkit-scrollbar 是 WebKit 内核浏览器（如 Chrome、Safari） 的私有伪元素，在 Firefox（火狐）浏览器 中不被支持。
        scrollbar-width: none; Firefox 
        -ms-overflow-style: none; IE/Edge 
        */
        ::-webkit-scrollbar{
            display: none;
        }
        section ul li{
            height: 47px;
            font-size: 14px;
            text-align: center;
            line-height: 47px;
            color: #333333;
        }
        section ul li:hover{
            color: #e93b3d;
        }
        section>div{
            flex: 1;
            /* background-color: yellow; */
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            overflow: auto;
            
        }
        section .content>div{
