<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 600px;
            height: 300px;
            border: 5px solid pink;
            margin: 10px auto;
            display: grid;
            grid-template-rows: repeat(3,100px);
            grid-template-columns: repeat(6,100px);
            grid-template-areas: 'a a a a b b'
                                 'a a a a c c'
                                 'd d e f c c'
            ;
            overflow: hidden;
        }
        .box img{
            width: 100%;
        }
        .box img:nth-child(1){
            grid-area: a;
        }
        .box img:nth-child(2){
            grid-area: b;
        }
        .box img:nth-child(3){
            grid-area: d;
        }
        .box img:nth-child(4){
            grid-area: e;
        }
        .box img:nth-child(5){
            grid-area: f;
        }
        .box img:nth-child(6){
            grid-area: c;
        }
    </style>
</head>
