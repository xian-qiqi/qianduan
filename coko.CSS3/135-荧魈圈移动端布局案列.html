    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html,body{
            height: 100%;
        }
        ul{
            list-style: none;
        } 
        html{
            font-size: 20px;
        }
        body{
            /* width: 16rem; */
            display: flex;
            flex-direction: column;
            background-color: white;
        }
        
/* header */
        header{
            height: 2.2rem;
            background-color: #0cc440;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        header div{
            height: 1.25rem;
            width: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            /* line-height: 100%; 没用，line-height根据font-size进行居中设置，修改为line-height: 1.25rem;可行，但设置移动端不推荐具体数值进行设计
            text-align: center; */
            font-size: .6rem;
            color: #a9e4b4;
            background-color: #3dd066;
        }
        /* .h-box1{
            border-radius: .65rem 0 0 .65rem;
        } 
        .h-box2{
            border-radius: 0 .65rem .65rem 0;
        }*/
        header div:nth-child(1){
            border-radius: .65rem 0 0 .65rem;
        }
        header div:nth-child(2){
            border-radius: 0 .65rem .65rem 0;
            
        }

        /*无法使用
电脑端（鼠标设备）：鼠标可以在元素上悬停（hover），触发 :hover 样式。
移动端（触摸屏设备）：用户通过 点击（触摸） 操作，没有“悬停”的概念，
        */
        header div:hover{
            color: white;
            background-color: #63d985;
            
        } 
        
/* section */
        section{
            flex: 1;
            overflow: auto;
            /* 溢出自动滚动 */
            
        }
        section ul{
            /* 使该板块固定 */
            position: sticky;
            top: 0rem;
            background-color: white;
            display: flex;
            /* height: 1.75rem;
            justify-content: space-around; 
            align-items: center; */
        }
        section ul li{
            flex: 1; 
            height: 1.75rem;
            text-align: center;
            line-height: 1.75rem;
            border-bottom: .05rem solid #d9d9d9;
            color: #8c8c8c;
            font-size: .7rem;
        }
        section ul li:hover{
            color: #14bf4d;
            border-bottom: .2rem solid #08c63e;
        }
        section .list{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        section .list div{
            width: 49%;
            margin-top: .2rem;
            border: .05rem solid #d5d5d7;
            /* color: ; */
            background-color: white;
        }
        section .list div img{
            width: 100%;
        }
        section .list div p{
            height: 1.5rem;
            line-height: 1.5rem;
            font-size: .6rem;
            text-indent: .5rem;
        }
/* footer */
        footer{
            height: 2.2rem;
            background-color: white;
            
        }
        footer ul{ 
            display: flex;
            height: 100%;
        }
        footer li{
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            color: #8c8c8c;
        }
        footer li i{
            height: 1.05rem;
            font-size: .8rem;
            text-align: center;
            line-height: 1.05rem;
        }
        footer li span{
            height: .85rem;
            font-size: .6rem;
            text-align: center;
            line-height: .85rem;
        }
        footer ul li:hover{
            color: #08ca43;
        }
        footer li:nth-child(3){
            position:relative;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-end;
        }
        footer li:nth-child(3) i{
            height: 2.5rem;
            width: 2.5rem;
            border: .05rem solid #dadada;
            border-radius: 50%;
            position: absolute;
            font-size: 1.5rem;
            text-align: center;
            line-height: 2.5rem;
            background-color: white;
        }
        .iconfont{
            font-size: .8rem;
        }
    </style>
