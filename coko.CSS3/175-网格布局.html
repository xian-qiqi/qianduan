<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: pink;
            /* 行内元素一般无法设置宽高，且在同一行，块级元素可设置宽高，且独占一行 */
            /* display: grid;块级网格 独占一行*/
            /* display: inline-grid;行内块级网格 */
            display: inline-grid;
        }
    </style>
</head>
<body>
    <!-- 网格布局 Drid  display: grid;
     行属性
     列属性-->
     <span>11111</span>
     <span class="box">22222</span>
</body>
</html>
