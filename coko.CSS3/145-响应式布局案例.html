<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .top{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .top>div{
            width: 49%;
        }
        .top img{
            width: 100%;
        } 
        .top .right{
            display: flex;
            justify-content: space-between;
        }
        .top .right>div{
            width: 49%;
        }

        @media  screen and  (max-width:768px){
            .top>div{
                width: 100%;
            }
        }

        .bottom{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .bottom>div{
            width: 23%;
            border: 1px solid rgb(141, 138, 138);
            padding: 5px;
            box-sizing: border-box;
            margin-top: 10px;
            box-shadow: 2px 2px 5px gray,-2px -2px 5px gray;
        }
        .bottom img{
            width: 100%;
        }
        .bottom div p{
            font-size: 14px;
            padding-bottom: 6px;
        }

        @media screen and (min-width:768px) and (max-width:1024px){
           .bottom>div{
                width: 31%;
                
            } 
        }
        @media screen and (min-width:450px) and (max-width:768px){
           .bottom>div{
                width: 48%;
                
            } 
        }
        @media screen and (max-width:450px){
           .bottom>div{
                width: 90%;
                
            } 
        }
    </style>
</head>
<body>
    
    <!-- 
top:flex wrap
    >768px 左49% 右49%
    <768  上100 下49%
bottom:flex wrap
    >1024 24%*4
    >768 <1024 31%*3
    >450 <768 48%2
    <450 90%*1
    -->
