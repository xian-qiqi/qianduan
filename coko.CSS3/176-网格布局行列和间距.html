<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 600px;
            height: 600px;
            border: 3px solid gray;
            display: grid;
            /* 固定值 */
            grid-template-rows: 200px 200px 200px;
            grid-template-columns: 200px 200px 200px;
            /* 百分比 */
            grid-template-rows: 25% 25% 25% 25%;
            grid-template-columns: 25% 25% 25% 25%;
            /* repeat函数 */
            grid-template-rows: repeat(5,20%);
            grid-template-columns: repeat(6,20%);
            /* 自动填充repeat autofill */
            grid-template-rows: repeat(autofill,20%);
            grid-template-columns: repeat(autofill,20%);
            /* fr片段 */
            grid-template-rows: 11fr 1fr 1fr;
            grid-template-columns: 100px 1fr 300px;
            /* minmax*/
            grid-template-rows:minmax(100px ,200px) 200px 300px;

            /* auto */
            grid-template-rows: 200px auto 200px;
            grid-template-columns: 200px auto 200px;


            /* 间距 */  
            grid-template-rows: 200px 180px 180px;
            grid-template-columns: 200px 180px 180px;
            
            grid-row-gap: 20px;
            grid-column-gap: 20px;
            /* 等价于 grid-gap: 20px 20px;*/
        }

            .box div{
                border: 1PX solid red;
            }

    </style>
</head>
<body>
    <!-- S
    行属性grid-template-rows:
    列属性grid-template-columns
    间距grid-gap
    -->
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </div>
</body>
</html>
