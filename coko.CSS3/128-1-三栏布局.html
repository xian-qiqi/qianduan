<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        html,body{
            height: 100%;
        }

        body{
            display: flex;
            flex-direction: column;
        }
        .top,.buttom{
            height: 100px;
            background-color: rgb(52, 147, 96);
        }
        .center{
            /* width: calc(100% - 200px); */
            flex: 1;
            background-color: rgb(219, 95, 95);
            display: flex;
            flex-direction: row;
        }
        
        .cen-left,.cen-right{
            width: 100px;
            background-color: rgb(228, 171, 48);
        }
        .cen-cen{
            flex: 1;
            background-color: rgb(208, 89, 154);
        }

        
    </style>
</head>
<body>
    <div class="top"></div>
    <div class="center">
        <div class="cen-left"></div>
        <div class="cen-cen"></div>
        <div class="cen-right"></div>
    </div>
    <div class="buttom"></div>
</body>
</html>
