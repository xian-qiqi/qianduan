    <h1>质子返秦，继位掌权</h1>
    <p>
        <strong>秦始皇<sup>[1S]</sup></strong>（公元前259年—前210年），享年49岁，姓嬴，名政。出生于赵国邯郸，后被送<br>回秦国。 
    </p>
    <p>
        公元前247年，<em><strong>年仅13岁的嬴政被立为秦王</strong></em>，尊<b>吕不韦<sub>[2]</sub></b>为仲父，
        当时国政都由吕不韦把<br>持。 在吕不韦把持朝政的时间里，与当时的太后赵姬（嬴政母亲）关系密切。吕不韦见<br>
        嬴政逐渐长大， 担心他与赵姬之间的关系被发现，于是想离开赵姬，但同时又担心赵姬<br>心生怨恨，于是把当时自己
        的门客嫪毐假施腐刑，献给太后，供其淫乐。
    </p>

    <p>门票不要<del>998</del>，不要<del>99</del>，只要<b><u>9.9</u></b></p>

    <p>
        
        <sup>[1]</sup>统一六国
        <sub>[2]</sub>秦国仲父
    </p>
