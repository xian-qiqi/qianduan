<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ctrl＋/ 生成注释标签 -->
    
    <!-- 
    1.li里面可以放随意标签，但是ol里面只能放li标签
    2.数字是自动生成的
    3.type：1 a A i I
      start：取值只能是一个数字，才可以生效
    -->

    <ol>
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>

    <ol type="A">
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>

    <ol type="I">
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>

    <ol type="A" start="3">
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>

    <ol type="A" start="27">
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>

    <ol type="A" start="29">
        <li>你是猪</li>
        <li>他是猪</li>
        <li>你们都是猪</li>
    </ol>
</body>
</html>
