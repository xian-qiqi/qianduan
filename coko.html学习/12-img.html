<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="3F08BC296C0AEEA38D392B0840CA0BFD.png" alt="错误请尝试刷新页面">
    <img src="4F08BC296C0AEEA38D392B0840CA0BFD.png" alt="错误请尝试刷新页面" title="这是原神游戏的主角莹">

    <!-- title将鼠标放于图片上提示的信息 -->
    <!-- 无论图片输入是否错误，title都能起作用 -->
    <img src="3F08BC296C0AEEA38D392B0840CA0BFD.png" title="这是原神游戏的主角莹">

    <img src="3F08BC296C0AEEA38D392B0840CA0BFD.png" width="500" height="800">
    <!-- 若只设置width或height,图片会按照原图比例放大缩小 -->
    <img src="3F08BC296C0AEEA38D392B0840CA0BFD.png" width="600">
    <img src="3F08BC296C0AEEA38D392B0840CA0BFD.png" height="600">



</body>
</html>
