<!-- 行内式 -->
     <!-- a标签，书写在href属性上 alert('hello')是指在浏览器弹出一个提示框-->

      <!-- 非a标签，书写在行为属性上 -->
    <div onclick=" alert('hello world')">点我一下</div>

<!-- 内嵌式 将代码写在一个script标签内-->

 使用<script src=''>
