<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Z-CSS/7.02base.css">
    <link rel="stylesheet" href="../Z-CSS/7.10list.css">
</head>
<body>
    
    <div class="header">
        商品列表
        <p class="active">
            <a href="./7.02index.html">返回首页</a>
        </p>
    </div>

    <div class="filterBox">
        <div class="content">
            <p>分类</p>
            <ul class="category">
                <!-- <li class="active">全部</li> 好像写不写都一样-->
            </ul>
        </div>
        <div class="content">
            <p>筛选</p>
            <ul class="filter">
                <li data-type="" class="active">全部</li>
                <li data-type="sale">折扣</li>
                <li data-type="hot">热销</li> 
                <!-- ! data-type 为自定义属性-->
            </ul>
        </div>
        <div class="content">
            <p>折扣</p>
            <ul class="sale">
                <li sale-type="10" class="active">全部</li>
                <li sale-type="5">5</li>
                <li sale-type="6">6</li>
                <li sale-type="7">7</li>
                <li sale-type="8">8</li>
                <li sale-type="9">9</li>
            </ul>
        </div>
        <div class="content">
            <p>排序</p>
            <ul class="sort">
                <li sort-type="id" method="ASC" class="active">综合升序</li>
                <li sort-type="id" method="DESC">综合降序</li>
                <li sort-type="price" method="ASC">价格升序</li>
                <li sort-type="price" method="DESC">价格降序</li>
                <li sort-type="sale" method="ASC">折扣升序</li>
                <li sort-type="sale" method="DESC">折扣降序</li>
            </ul>
        </div>
        <div class="content">
            <p>搜索</p>
            <input type="text" class="search">
        </div>
        <div class="content">
            <!-- 小于符号< -->
            <span class="left">&lt;</span> 
            <span class="total">1 / 10</span>
            <!-- 大于符号> -->
            <span class="right">&gt;</span>
            <select>
                <option value="12">12</option>
                <option value="16">16</option>
                <option value="20">20</option>
                <option value="24">24</option>
            </select>
            <input type="text" value="1" class="page">
            <button class="jump">跳转</button>
        </div>   
    </div>

    <ul class="list">
        <!-- <li>
            <div class="show">
                <img src="" alt="">
                <div class="hot">hot</div>
                <div class="sale">sale</div>  
            </div>
            <div class="info">
                <p class="title">荧魈小卡</p>
                <p class="price">
                    <span class="current">￥ 60.00</span>
                    <span class="old">￥ 45.00</span>
                </p>
                <button>加入购物车</button>
            </div>
        </li> -->
    </ul>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../JS/list.js"></script>
    
</body>
</html>
