    <!-- 案例：封装函数，获取两个时间节点之间的时间差 -->
     <script>

        function get_Diff(t1,t2){
            var ms1 = t1.getTime()
            var ms2 = t2.getTime()
            //得到秒数
            var sub =Math.abs( (ms2 - ms1)/1000 ) 
            //得到天数
            var day = Math.floor( sub / ( 60 * 60 * 24 ) )
            
            //得到相差的小时数
            var hours = Math.floor( sub%( 60*60*24 )/(60*60) )
            
            //得到相差的分钟数
            var minutes = Math.floor( sub%( 60*60)/60)
            
            //得到相差的小时数
            var seconds = sub%60
            return {day: day, hours: hours, minutes: minutes, seconds: seconds}
            
        }

        var t1 = new Date(2025, 9, 14, 16, 1, 55)
        var t2 = new Date(2025, 11, 12, 16, 1, 55)
        var res = get_Diff(t1, t2)
        console.log(res)
     </script>
