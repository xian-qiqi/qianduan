<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 对象：键值对的集合 -->
     <script>

        //创建对象
        var obj = {
            name: 'qixian',
            age: 21,
            job: 'student'
        }
        //增删查改
        //增加键值对（增删查改都一样）
        obj.a = 'lalala'
        obj['b'] = 56//[]内为字符串格式

        document.write(obj)
        console.log(obj)
     </script>
</body>
</html>
