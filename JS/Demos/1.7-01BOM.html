    <button id="on">开启</button>
    <button id="off">关闭</button>

    <button id="go">揍你</button>
    
<!-- window.open('地址')开启标签页
 window.close()关闭
 window.onload = function(){}资源加载完毕
 window.onresize = function(){}窗口尺寸发生变化
 window.onscroll = function(){}滚动条位置发生变化
 window.history.back()回退页面
 window.history.forward()前进页面
 window.scrollTo(left,top)浏览器滚动到
    //left：浏览器卷去的宽度
    //top浏览器卷去的高度
 -->
    <script>
        on.onclick = function(){
            //开启 标签页
            window.open('https://chat.deepseek.com')
        }
        off.onclick = function(){
            //关闭标签页
            window.close()
        }
        //资源加载完毕
        window.onload = function(){
            console.log('资源已经加载完毕！')
        }
        //窗口尺寸改变
        window.onresize = function(){
            console.log('窗口尺寸改变！')
        }
        //滚动条位置变化
        window.onscroll = function(){
            console.log('滚动条位置变化！')
            
            //浏览器卷去的高度

            //document.documentElement.scrollTop在有<!DOCTYPE html>文件名时使用，document.body.scrollT在没有<!DOCTYPE html>文件名时使用，以下为兼容性写法
            var height1 = document.documentElement.scrollTop || document.body.scrollTop 
            //浏览器卷去的宽度
            var width1 = document.documentElement.scrollLeft || document.body.scrollLeft
            console.log(height1)
            console.log(width1)
        }

    //浏览器滚动到window.scrollTo(left,top)
        //left：浏览器卷去的宽度
        //top浏览器卷去的高度
    //传递一个对象，可以设置如何滚动window.scrollTo({
    //     left:xx,
    //     top:yy,
    //     behavior:'smooth'平滑滚动
    // })
        go.onclick = function(){
            window.scrollTo(1000,1500)//瞬间定位到1000，1500的位置
        }
        go.onclick = function(){
            window.scrollTo({
                left: 200,
                top:500,
                behavior:"smooth"
            })
        }
        
    </script>
