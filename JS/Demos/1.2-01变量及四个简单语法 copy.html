<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- 
    alert(container)   以浏览器弹出层出现
    console.log(container) 把内容输出在浏览器的控制台上
    document.write(container)将内容直接输出在页面上
    typeof关键字  进行数据类型检测
    标签.innerText = '内容'   给标签添加内容
-->
    <script>
        <!-- 变量 ,使用var命名-->
        var num = 100
        var container = 'I am such a beauty.'
        alert(container)
        console.log(container)
        document.write(container)
        var result = typeof num
        document.writeln(result)

    </script>
    
</body>
</html>
