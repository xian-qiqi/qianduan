    <!-- 
        所有方法都不会改变原始字符串，而是返回一个新的数组
1、charAt(索引)获取索引位置的字符
2、toLowerCase()将所有字符转换为小写
3、toUpperCase()将所有字符转换为小=大写
4、replace(换下内容，换上内容)将第一个替换
5、trim()去除字符串首尾的空格，返回去除空格后的字符串一个数组
6、split(分隔符)按照分隔符将字符串切割为一个数组
7、substr(开始索引，多少个)截取字符串，返回值为截取出来的字符串
8、substring(开始索引，结束索引)截取字符串，返回值为截取出来的字符串，前开后闭
9、slice(开始索引，结束索引)截取字符串，返回值为截取出来的字符串，前开后闭
     -->
