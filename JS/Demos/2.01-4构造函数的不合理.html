<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*构造函数的不合理

        当你在构造函数体内书写了方法时：
            你在向不同对象添加方法时
            只要创建了一次对象（new），就会有一个函数在占用空间
            创建100次对象，就有100个一摸一样的函数出现
            但其实99个函数都是重复的，没有存在必要，浪费空间
        */
        function Person(name, age){
            //构造函数要产生有属性和方法的合理的对象
            //属性
            this.name = name
            this.age = 20
            //方法
            this.sayHi = function(){ console.log('Hello World!') }
        }
        var p1 = new Person('Jack', 20)
        var p2 = new Person('Rose', 18)
        console.log(p1,p2)
        //调用两个对象的方法
        p1.sayHi()
        p2.sayHi()
        //看一下是不是真的两个对象
        console.log(p1 == p2)//false 确实是两个对象

        //两个对象里的函数
        console.log(p1.sayHi)
        console.log(p1.sayHi)
        console.log(p1.sayHi == p2.sayHi)//为两个不同的函数--不合理
    </script>
</body>
</html>
