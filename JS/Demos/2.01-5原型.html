<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        原型 prototype
            定义：每一个函数天生自带的属性，叫做prototype，是一个对象
            构造函数也是函数，也有自带的空间prototype
            既然prototype是一个对象，我们可以使用对象操作方法，向里面添加内容

        对象
            定义：每一个对象，在访问其成员时，自己没有这个属性，会自动去所属构造函数的prototype上查找，自定义构造函数创建的对象也是对象，具有以上特点

            构造函数在创建对象的过程，起名为实例化过程
            创建出来的对象叫做构造函数的一个实例化对象

        */

        function Person(){
            console.log('Hello')
        }
        Person.prototype.sayHi = function(){console.log('我是Person原型上的方法')}

        console.log(Person.prototype)
        console.log(Person.prototype.sayHi)
        console.log(Person.prototype.sayHi())
        console.log(Person())

        // 创建一个实例化对象
        // 因为 p1 是 Person 实例化出来的对象
        //p1 就是属于 Person 这个构造函数的
        // 当你访问 p1 的 sayHi 成员的时候，p1 自己是没有的
        // 会自动去 Person 的原型（prototype）上查找 
        var p1 = new Person()
        console.log(p1)
        p1.sayHi()
        // 创建第二个实例化对象
        // 因为 p2 也是 Person 的实例化对象
        //p2 没有 sayHi 成员，也会自动去 Person 的原型上查找
        var p2 = new Person()
        console.log(p2)
        /*
        p1 的 sayHi 方法和 p2 的 sayHi 方法都是使用的 Person 构造函数的原型上的方法
        我只要向 Person 的原型上添加一些方法
        所有的 Person 的每一个实例都可以使用
        并且使用的都是同一个函数。不会出现浪费空间的行为
        */
        console.log(p1.sayHi === p2.sayHi)
    </script>
</body>
</html>
