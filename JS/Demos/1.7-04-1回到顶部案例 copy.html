<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 3000px;
        }
        .header{
            height: 80px;
            width: 100%;
            background-color: rgb(68, 169, 210);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transition: top 0.5s linear;
            position: fixed;
            top: -80px;
            left: 0;
        }
        .goTop{
            width: 50px;
            height: 50px;
            background-color: skyblue;
            font-size: 25px;
            text-align: center;
            line-height: 25px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #fff;
            display: none;/* 将goTop盒子隐匿起来 */
        }
    </style>
</head>
<body>
    <div class="header">顶部通栏</div>
    <div class="goTop">回到顶部</div>
    <script>
        //获取元素
        var header = document.querySelector('.header')
        var goTop = document.querySelector('.goTop')
        //给浏览器绑定滚动事件
        window.onscroll = function(){
            //获取浏览器卷去的高度
            var height = document.documentElement.scrollTop ||document.body.scrollTop
            //判断卷去的高度，是否大于临界点，大于则出现‘回到顶部’
            if(height>=300){
                header.style.top = '0px'
                goTop.style.display = 'block'
            }else{
                header.style.top = '-80px'
                goTop.style.display = 'none'
            }
        }

        //给浏览器设置点击事件
        goTop.onclick = function(){
            //让页面滚动到顶部
            window.scroll({
                top: 0,
                behavior: 'smooth'
            }
                
            )
        }
    </script>
</body>
</html>
